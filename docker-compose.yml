services:

  # ── ChromaDB — database vettoriale ──────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    ports:
      - "8000:8000"      # esposto su host per il server MCP locale
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Ollama — embedding locale ────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    profiles: ["with-ollama"]
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 20s
    restart: unless-stopped
    # Per GPU NVIDIA: decommenta le righe seguenti
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ── Init — scarica il modello al primo avvio ─────────────────────────────────
  ollama-init:
    image: ollama/ollama:latest
    profiles: ["with-ollama"]
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["ollama", "pull", "nomic-embed-text"]
    restart: "no"

  # ── Bridge server — Node.js/Express ─────────────────────────────────────────
  server:
    build: ./server
    ports:
      - "3000:3000"      # esposto su host per l'estensione Chrome
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_BASE=${OLLAMA_BASE:-http://ollama:11434}
      - CHROMA_URL=http://chromadb:8000
      - CODEBASE_HOST_PATH=${CODEBASE_HOST_PATH:-.}
    volumes:
      # Bind-mount della codebase host per /api/ingest-codebase.
      # Default: la directory corrente (dove sta docker-compose.yml).
      # Override con CODEBASE_HOST_PATH nel .env per puntare ad altre cartelle.
      - ${CODEBASE_HOST_PATH:-.}:/workspace:ro
    depends_on:
      chromadb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  chroma_data:    # dati ChromaDB persistenti
  ollama_data:    # modelli Ollama (nomic-embed-text ~274 MB)
